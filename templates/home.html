{% extends "layout.html" %}
{% block content %}
    <h1>Home Page</h1>
    {% for ticket in tickets %}
        <h2>
            <a href="/tickets/{{ ticket.id }}">
                {{ ticket.title }}
            </a>
        </h2>
        <p>{{ ticket.description }}</p>
        <p>{{ ticket.status }}</p>
    {% endfor %}
{% endblock content %}
